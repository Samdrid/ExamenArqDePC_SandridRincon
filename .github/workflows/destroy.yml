name: Destroy Infrastructure

on:
  workflow_dispatch:

jobs:
  destroy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Delete CloudFormation stack
        run: |
          aws cloudformation delete-stack --stack-name examen-final-stack

      - name: Wait for stack deletion to complete
        run: |
          aws cloudformation wait stack-delete-complete --stack-name examen-final-stack

      - name: Confirm deletion
        run: |
          echo "Stack examen-final-stack eliminado correctamente."